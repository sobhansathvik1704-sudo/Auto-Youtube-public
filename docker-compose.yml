
services:
  db:
    image: postgres:16-alpine
    container_name: youtube_ai_db
    environment:
      POSTGRES_DB: youtube_ai
      POSTGRES_USER: youtube_ai
      POSTGRES_PASSWORD: youtube_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youtube_ai -d youtube_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: youtube_ai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      network: host  # <--- Added this to fix DNS in WSL
    container_name: youtube_ai_api
    env_file:
      - ./backend/.env.example
    environment:
      - ARTIFACTS_DIR=/data/artifacts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - video_artifacts:/data/artifacts
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      network: host  # <--- Added this to fix DNS in WSL
    container_name: youtube_ai_worker
    env_file:
      - ./backend/.env.example
    environment:
      - ARTIFACTS_DIR=/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - video_artifacts:/data/artifacts
    command: >
      celery -A app.core.celery_app.celery_app worker --loglevel=INFO

  frontend:
    build:
      context: ./frontend
    container_name: youtube_ai_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  video_artifacts: